name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main

      - name: Setup DevSpace
        uses: agynio/e2e/.github/actions/setup-devspace@main

      - name: Deploy organizations from source
        run: devspace dev

      - name: Run E2E tests
        uses: agynio/e2e/.github/actions/run-tests@4c6ec5c5025ee6ad63ca0e8c0c3b2ba898108dc3
        with:
          service: organizations
